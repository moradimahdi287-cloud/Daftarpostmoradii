<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر پست مرادی</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        body { font-family: 'Vazirmatn', system-ui, sans-serif; }
        .nesie { background-color: #fef3c7 !important; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">

<!-- Login -->
<div id="login-page" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-100 to-yellow-100 dark:from-gray-900 dark:to-gray-800">
    <div class="bg-white dark:bg-gray-800 p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fa-solid fa-envelope text-7xl text-blue-600 mb-4"></i>
            <h1 class="text-3xl font-bold">دفتر پست مرادی</h1>
        </div>
        <input id="username" type="text" value="admin" class="w-full p-5 rounded-2xl border mb-4" placeholder="نام کاربری">
        <input id="password" type="password" value="123456" class="w-full p-5 rounded-2xl border mb-6" placeholder="رمز عبور">
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-3xl text-xl font-bold">ورود به سامانه</button>
        <p class="text-center text-sm mt-6 text-gray-500">admin / 123456</p>
    </div>
</div>

<!-- Main App -->
<div id="main-app" class="hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-72 bg-white dark:bg-gray-800 border-l shadow-2xl flex flex-col">
            <div class="p-6 bg-gradient-to-r from-blue-700 to-blue-600 text-white">
                <h1 class="text-2xl font-bold">دفتر پست مرادی</h1>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a onclick="navigateTo('home')" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer">صفحه اصلی</a>
                <a onclick="navigateTo('list')" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer">لیست مرسولات</a>
                <a onclick="navigateTo('archive')" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer">بایگانی</a>
                <a onclick="navigateTo('settings')" class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-blue-50 dark:hover:bg-gray-700 cursor-pointer">تنظیمات</a>
            </nav>
            <div class="p-4 border-t">
                <button onclick="logout()" class="w-full py-3 text-red-500 hover:bg-red-50 rounded-2xl">خروج</button>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-auto">
            <div class="p-8 max-w-5xl mx-auto">
                <h2 id="page-title" class="text-3xl font-bold mb-8">ثبت مرسوله جدید</h2>

                <!-- Home Page -->
                <div id="page-home">
                    <form id="shipment-form" onsubmit="registerShipment(event)" class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 space-y-8">
                        <input id="customer-name" type="text" placeholder="نام مشتری" required class="w-full p-5 rounded-2xl border text-lg">

                        <div class="grid grid-cols-3 gap-6">
                            <div>
                                <label>تعداد</label>
                                <input id="quantity" type="number" value="1" min="1" max="50" class="w-full p-5 rounded-2xl border">
                            </div>
                            <div>
                                <label>نوع بسته</label>
                                <select id="package-type" onchange="changePackageType()" class="w-full p-5 rounded-2xl border">
                                    <option value="envelope">پاکت</option>
                                    <option value="carton">کارتن</option>
                                </select>
                            </div>
                            <div>
                                <label>اندازه</label>
                                <select id="size" class="w-full p-5 rounded-2xl border"></select>
                            </div>
                        </div>

                        <div>
                            <label>نوع پرداخت</label>
                            <div class="grid grid-cols-4 gap-3" id="payment-options"></div>
                        </div>

                        <div>
                            <label>نوع ارسال</label>
                            <div class="grid grid-cols-4 gap-3" id="shipping-options"></div>
                        </div>

                        <div class="grid grid-cols-3 gap-6">
                            <div>
                                <label class="flex items-center gap-2">
                                    <input type="checkbox" id="label-cost" checked> هزینه لیبل (۱۵,۰۰۰)
                                </label>
                            </div>
                            <div>
                                <label>هزینه بسته‌بندی</label>
                                <input id="packaging-cost" type="text" value="0" oninput="formatNumber(this)" class="w-full p-5 rounded-2xl border">
                            </div>
                            <div>
                                <label>هزینه پست</label>
                                <input id="post-cost" type="text" value="0" oninput="formatNumber(this)" class="w-full p-5 rounded-2xl border">
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-7 rounded-3xl text-2xl font-bold">ثبت مرسوله</button>
                    </form>
                </div>

                <!-- List & Archive Pages (will be populated by JS) -->
                <div id="page-list" class="hidden">...</div>
                <div id="page-archive" class="hidden">...</div>
                <div id="page-settings" class="hidden">
                    <button onclick="toggleDarkMode()" class="px-8 py-4 bg-gray-800 text-white rounded-2xl">تغییر حالت تاریک</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// === Login System ===
const USERNAME = "admin";
const PASSWORD = "123456";

function login() {
    if (document.getElementById('username').value === USERNAME && document.getElementById('password').value === PASSWORD) {
        document.getElementById('login-page').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        localStorage.setItem('isLoggedIn', 'true');
        initApp();
    } else {
        alert("نام کاربری یا رمز اشتباه است!");
    }
}

function logout() {
    localStorage.removeItem('isLoggedIn');
    location.reload();
}

// === App Logic ===
let shipments = JSON.parse(localStorage.getItem('shipments')) || [];

function initApp() {
    renderPaymentOptions();
    renderShippingOptions();
    renderSizeOptions();
}

function renderSizeOptions() {
    // Logic for sizes
}

function registerShipment(e) {
    e.preventDefault();
    const customer = document.getElementById('customer-name').value;
    if (!customer) return alert("نام مشتری را وارد کنید");

    const shipment = {
        id: Date.now(),
        date: new Date().toLocaleDateString('fa-IR'),
        customer: customer,
        quantity: parseInt(document.getElementById('quantity').value),
        postCost: parseInt(document.getElementById('post-cost').value.replace(/[^0-9]/g,'')) || 0,
        profit: 25000 // Simplified
    };

    shipments.unshift(shipment);
    localStorage.setItem('shipments', JSON.stringify(shipments));
    alert("✅ مرسوله با موفقیت ثبت شد!");
    e.target.reset();
}

function formatNumber(input) {
    let val = input.value.replace(/[^0-9]/g, '');
    input.value = Number(val).toLocaleString('fa-IR');
}

function toggleDarkMode() {
    document.documentElement.classList.toggle('dark');
}

// Navigation
function navigateTo(page) {
    document.querySelectorAll('#page-home, #page-list, #page-archive, #page-settings').forEach(el => el.classList.add('hidden'));
    if (page === 'home') document.getElementById('page-home').classList.remove('hidden');
    // Add more pages later
    document.getElementById('page-title').textContent = page === 'home' ? 'ثبت مرسوله جدید' : page;
}

// Auto login check
if (localStorage.getItem('isLoggedIn') === 'true') {
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    initApp();
}
</script>
</body>
</html>
