<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدیریت دفتر پستی</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* مرحله دوم CSS کامل جایگزین این قسمت می‌شود */
</style>

</head>

<body>

<div class="app">

<!-- منوی کناری -->
<aside class="sidebar">

<div class="logo">
<i class="bi bi-box-seam"></i>
<h2>دفتر پستی</h2>
</div>

<ul>

<li class="active">
<i class="bi bi-house"></i>
صفحه اصلی
</li>

<li>
<i class="bi bi-truck"></i>
لیست مرسولات
</li>

<li>
<i class="bi bi-archive"></i>
بایگانی
</li>

<li>
<i class="bi bi-gear"></i>
تنظیمات
</li>

</ul>

</aside>


<!-- محتوای اصلی -->
<main class="content">


<header class="topbar">

<button id="menuBtn">
<i class="bi bi-list"></i>
</button>

<h1>
<i class="bi bi-envelope-paper"></i>
مدیریت مرسولات
</h1>

<div id="dateBox">
تاریخ امروز
</div>

</header>



<!-- فرم ثبت مرسوله -->

<section class="card">

<h2>
<i class="bi bi-plus-circle"></i>
ثبت مرسوله جدید
</h2>


<div class="form-grid">


<div class="field">

<label>نام مشتری</label>

<input id="customerName" 
type="text"
placeholder="نام مشتری را وارد کنید">

</div>



<div class="field">

<label>تعداد مرسوله</label>

<select id="parcelCount">

</select>

</div>



<div class="field">

<label>پاکت / کارتن</label>

<select id="packageType">

<option value="0">
هیچی
</option>

<optgroup label="پاکت">

<option value="30000">
پاکت چک - ۳۰,۰۰۰ تومان
</option>

<option value="35000">
پاکت A5 - ۳۵,۰۰۰ تومان
</option>


<option value="45000">
پاکت A4 - ۴۵,۰۰۰ تومان
</option>


<option value="50000">
پاکت A3 - ۵۰,۰۰۰ تومان
</option>

</optgroup>



<optgroup label="کارتن">


<option value="50000">
کارتن سایز ۱ - ۵۰,۰۰۰ تومان
</option>


<option value="55000">
کارتن سایز ۲ - ۵۵,۰۰۰ تومان
</option>


<option value="65000">
کارتن سایز ۳ - ۶۵,۰۰۰ تومان
</option>


<option value="85000">
کارتن سایز ۴ - ۸۵,۰۰۰ تومان
</option>


<option value="105000">
کارتن سایز ۵ - ۱۰۵,۰۰۰ تومان
</option>


</optgroup>


</select>


</div>



<div class="field">

<label>نوع پرداخت</label>

<select id="payment">


<option>
صادرات
</option>

<option>
بلو
</option>


<option>
نسیه
</option>


<option>
نقدی
</option>


</select>

</div>



</div>



<hr>


<div class="checks">


<label>
<input type="checkbox" id="labelCost" checked>

هزینه لیبل (۱۵,۰۰۰ تومان)

</label>


</div>



<h3>
نوع ارسال
</h3>


<div class="send-types">


<label>
<input type="radio" name="send" value="normal" checked>
پیشتاز
</label>


<label>
<input type="radio" name="send" value="express">
اکسپرس
</label>


<label>
<input type="radio" name="send" value="special">
ویژه
</label>


<label>
<input type="radio" name="send" value="cash">
کرایه در مقصد
</label>


</div>



<div class="form-grid">


<div class="field">

<label>
هزینه بسته بندی
</label>


<input id="packing"
type="text"
placeholder="مثلا ۱۰۰,۰۰۰">


</div>



<div class="field">


<label>
هزینه پست
</label>


<input id="postPrice"
type="text"
placeholder="مثلا ۵۰۰,۰۰۰">


</div>



</div>



<button id="saveBtn">

<i class="bi bi-save"></i>

ثبت مرسوله

</button>



</section>





<!-- لیست ثبت شده -->

<section class="card">


<h2>
<i class="bi bi-list-ul"></i>

مرسولات امروز

</h2>



<table>


<thead>

<tr>

<th>
تاریخ
</th>


<th>
تعداد
</th>


<th>
نوع پست
</th>


<th>
لیبل
</th>


<th>
بسته بندی
</th>


<th>
پاکت/کارتن
</th>


<th>
سود دفتر
</th>


<th>
هزینه پست
</th>


</tr>

</thead>


<tbody id="parcelList">


</tbody>


</table>


</section>




<button class="endDay">

<i class="bi bi-calendar-check"></i>

خاتمه روز

</button>



</main>


</div>




<script>

// مرحله سوم جاوااسکریپت کامل اینجا قرار میگیرد


</script>



</body>
</html>
