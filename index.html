<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دفتر پستی</title>
<style>
body{margin:0;font-family:tahoma;background:#eef3f8}
.top{background:#114b8b;color:#fff;padding:12px}
.menu{position:fixed;right:-260px;top:0;width:250px;height:100%;background:#114b8b;color:#fff;transition:.3s;padding:15px;box-sizing:border-box;z-index:1000}
.menu.open{right:0}
.card{background:#fff;margin:10px;padding:12px;border-radius:12px}
.btn{background:#ffd400;border:none;padding:10px;border-radius:8px;width:100%;margin:5px 0;cursor:pointer}
input,select{width:100%;padding:10px;margin:4px 0;box-sizing:border-box;border:1px solid #ddd;border-radius:6px}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px;text-align:center}
.delete-btn{background:#ff4444;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:0.9em}
a{color:white;text-decoration:none;display:block;padding:8px 0}
a:hover{background:rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="top"><button class="btn" onclick="toggleMenu()">☰ منو</button></div>

<div id="menu" class="menu">
<h3>دفتر پستی</h3>
<div><a href="#ship" onclick="toggleMenu()">ثبت مرسوله</a></div>
<div><a href="#bulk" onclick="toggleMenu()">مشتری انبوه</a></div>
<div><a href="#archiveSec" onclick="toggleMenu()">بایگانی</a></div>
</div>

<div class="card" id="ship">
<input id="date" placeholder="1405/05/01" maxlength="10">
<input id="customer" placeholder="نام مشتری">
<select id="count"><option value="1" selected>1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option><option value="32">32</option><option value="33">33</option><option value="34">34</option><option value="35">35</option><option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option><option value="41">41</option><option value="42">42</option><option value="43">43</option><option value="44">44</option><option value="45">45</option><option value="46">46</option><option value="47">47</option><option value="48">48</option><option value="49">49</option><option value="50">50</option></select>
<select id="payType">
<option>صادرات</option><option>بلو</option><option>نسیه</option><option>نقد</option>
</select>
<select id="item">
<option value="0">هیچی</option>
<option value="30000">پاکت چک - ۳۰٬۰۰۰ تومان</option>
<option value="35000">پاکت A5 - ۳۵٬۰۰۰ تومان</option>
<option value="45000">پاکت A4 - ۴۵٬۰۰۰ تومان</option>
<option value="50000">پاکت A3 - ۵۰٬۰۰۰ تومان</option>
<option value="50000">کارتن ۱ - ۵۰٬۰۰۰ تومان</option>
<option value="55000">کارتن ۲ - ۵۵٬۰۰۰ تومان</option>
<option value="65000">کارتن ۳ - ۶۵٬۰۰۰ تومان</option>
<option value="85000">کارتن ۴ - ۸۵٬۰۰۰ تومان</option>
<option value="105000">کارتن ۵ - ۱۰۵٬۰۰۰ تومان</option>
</select>
<label><input type="checkbox" id="labelFee"> لیبل ۱۵٬۰۰۰ تومان</label>
<input id="packFee" type="text" placeholder="هزینه بسته بندی (تومان)" maxlength="15">
<select id="ptype">
<option>پیشتاز</option>
<option>اکسپرس</option>
<option>ویژه</option>
<option>کرایه مقصد</option>
</select>
<input id="postCost" type="text" placeholder="هزینه پست (تومان)" maxlength="15">
<button class="btn" onclick="addShipment()">ثبت مرسوله</button>
<button class="btn" onclick="closeDay()">خاتمه روز</button>
</div>

<div class="card">
سود پست: <span id="sp">۰ تومان</span><br>
سود اقلام: <span id="si">۰ تومان</span><br>
سود کل: <span id="st">۰ تومان</span><br>
تعداد: <span id="sc">۰</span>
</div>

<div class="card">
<table id="tbl">
<tr><th>مشتری</th><th>تعداد</th><th>سود پست</th><th>سود اقلام</th><th>وضعیت</th><th>عملیات</th></tr>
</table>
</div>

<div class="card" id="bulk">
<input id="bulkName" placeholder="نام مشتری انبوه">
<input id="bulkCount" type="number" placeholder="تعداد بسته">
<input id="bulkAmount" type="text" placeholder="مبلغ کل (تومان)" maxlength="15">
<button class="btn" onclick="addBulk()">ثبت مشتری انبوه</button>
</div>

<div class="card" id="archiveSec">
<select id="archiveList" onchange="showArchive()"></select>
<div id="archiveView"></div>
</div>

<script>
function getCurrentShamsiDate() {
  const date = new Date().toLocaleDateString('fa-IR', { year: 'numeric', month: '2-digit', day: '2-digit' });
  return date.replace(/[/]/g, '/');
}
function $(id){return document.getElementById(id);}
function toggleMenu(){$('menu').classList.toggle('open');}
function fmt(n){return Number(n||0).toLocaleString('fa-IR') + ' تومان';}
function dayKey(d){return 'day_'+d;}
function getData(d){ return JSON.parse(localStorage.getItem(dayKey(d)) || '{"shipments":[],"bulk":[]}'); }
function saveData(d,data){ localStorage.setItem(dayKey(d), JSON.stringify(data)); }

function addShipment(){
 let d=$('date').value.trim();
 if(!d){alert('تاریخ را وارد کن');return;}
 let data=getData(d);
 let item=Number($('item').value||0);
 let label=$('labelFee').checked?15000:0;
 let pack=Number(($('packFee').value||'0').replace(/[\/,]/g,''));
 let post=Number(($('postCost').value||'0').replace(/[\/,]/g,''));
 let rate=$('ptype').value==='کرایه مقصد'?0.20:0.25;
 let payType=$('payType').value;
 data.shipments.push({customer:$('customer').value.trim() || 'بدون نام',count:$('count').value,payType:payType,paid:(payType!=='نسیه'), itemText:$('item').options[$('item').selectedIndex].text + (label?' + لیبل':'' ) + (pack?' + بسته بندی':'') , postProfit:Math.round(post*0.9*rate), itemProfit:item+label+pack});
 saveData(d,data);
 $('customer').value=''; $('packFee').value=''; $('postCost').value=''; $('labelFee').checked=false; $('item').selectedIndex=0;
 refresh();
 alert('ثبت شد');
}

function addBulk(){
 let d=$('date').value.trim();
 let data=getData(d);
 data.bulk.push({name:$('bulkName').value.trim() || 'بدون نام', count:Number($('bulkCount').value||0), amount:Number(($('bulkAmount').value||'0').replace(/[\/,]/g,''))});
 saveData(d,data);
 $('bulkName').value='';$('bulkCount').value='';$('bulkAmount').value='';
 refresh();
 alert('ثبت شد');
}

function deleteShipment(date,index){
console.log('delete',date,index);
if(!confirm('حذف شود؟')) return;
let data=getData(date);
index=parseInt(index);
if(!data.shipments) data.shipments=[];
index=Number(index);
data.shipments=data.shipments.filter((_,i)=>i!==index);
saveData(date,data);
refresh();
alert('حذف شد');
}

function markPaid(date,index){let data=getData(date);data.shipments[index].paid=true;saveData(date,data);refresh();}
function closeDay(){
 let d=$('date').value.trim();
 let a=JSON.parse(localStorage.getItem('archives')||'[]');
 if(!a.includes(d)){a.push(d);}
 localStorage.setItem('archives',JSON.stringify(a));
 loadArchives();
 alert('روز بایگانی شد'); try{let dt=new Date($('date').value);dt.setDate(dt.getDate()+1);$('date').value=dt.toISOString().split('T')[0];refresh();}catch(e){}
}

function loadArchives(){
 let a=JSON.parse(localStorage.getItem('archives')||'[]');
 $('archiveList').innerHTML='<option value="">انتخاب روز</option>';
 a.forEach(x=>{$('archiveList').innerHTML += `<option value="${x}">${x}</option>`;});
}

function showArchive(){
 let d=$('archiveList').value; if(!d) return;
 let data=getData(d); let pp=0,ip=0;
 data.shipments.forEach(r=>{pp+=r.postProfit;ip+=r.itemProfit;});
 let details='';
data.shipments.forEach(r=>{
 let bg=(r.payType==='نسیه' && !r.paid)?'background:yellow;':'';
 details += `<div style="${bg}border:1px solid #ddd;padding:6px;margin:4px 0">
 <b>${r.customer}</b><br>
 ${r.itemText||'بدون آیتم'}<br>
 سود اقلام: ${fmt(r.itemProfit)}<br>
 وضعیت: ${r.paid?'پرداخت شده':r.payType}
 ${(!r.paid)?'<br><button onclick="markPaid(\''+d+'\','+data.shipments.indexOf(r)+');showArchive()">پرداخت شد</button>':''}
 </div>`;
});
$('archiveView').innerHTML = `تاریخ: ${d}<br>مرسوله: ${data.shipments.length}<br>انبوه: ${data.bulk.length}<br>سود پست: ${fmt(pp)}<br>سود اقلام: ${fmt(ip)}<br>کل: ${fmt(pp+ip)}<hr>${details}`;
}

function refresh(){
 let d=$('date').value.trim();
 let data=getData(d);
 let pp=0,ip=0;
 let html='<tr><th>مشتری</th><th>تعداد</th><th>سود پست</th><th>سود اقلام</th><th>وضعیت</th><th>عملیات</th></tr>';
 data.shipments.forEach((r, i)=>{
  pp+=r.postProfit; ip+=r.itemProfit;
  let bg=(r.payType==='نسیه' && !r.paid)?'style="background:yellow"':'';
html += `<tr ${bg}><td>${r.customer}</td><td>${r.count||1}</td><td>${fmt(r.postProfit)}</td><td>${r.itemText||''}<br>${fmt(r.itemProfit)}</td><td>${r.paid?'پرداخت شده':r.payType}</td><td>${!r.paid?'<button onclick="markPaid(\''+d+'\','+i+')">پرداخت کرد</button> ':''}<button class="delete-btn" data-date="${d}" data-index="${i}" onclick="deleteShipment(this.dataset.date,this.dataset.index)">حذف</button></td></tr>`;
 });
 $('tbl').innerHTML=html;
 $('sp').innerText=fmt(pp); $('si').innerText=fmt(ip); $('st').innerText=fmt(pp+ip); $('sc').innerText=data.shipments.length;
}

window.onload = () => {
  $('date').value = getCurrentShamsiDate();
  loadArchives();
  refresh();
  $('date').addEventListener('change', refresh);
};

document.querySelectorAll('#packFee,#postCost,#bulkAmount').forEach(el=>{
  el.addEventListener('input',function(){
    let v=this.value.replace(/[\/,]/g,'').replace(/[^0-9]/g,'');
    this.value=v ? Number(v).toLocaleString('en-US') : '';
  });
});
</script>
</body>
</html>
